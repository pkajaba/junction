<?xml version="1.0" encoding="UTF-8"?>
<!-- Junction app icon, v0.2
     - Asymmetric J: stem + a fork at the bottom where the LEFT arm is the
       traditional J-hook (longer, curves further left) and the RIGHT arm
       is a short kicker representing the routing branch.
     - No top serif. A real J doesn't need one and the serif was making
       the previous draft read as "T/I". The J-ness comes from the
       asymmetric bottom hook.
     - White on indigo→violet gradient. macOS clips the corners to the
       system squircle automatically.
     -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7C5CF2"/>
      <stop offset="100%" stop-color="#3B2CAA"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <g stroke="white"
     stroke-width="84"
     stroke-linecap="round"
     stroke-linejoin="round"
     fill="none">
    <!-- Stem: slightly right of center so the left J-hook has room -->
    <line x1="552" y1="248" x2="552" y2="568"/>

    <!-- Left arm: the traditional J-hook. Curves down then back left,
         making the silhouette unambiguously "J". -->
    <path d="M 552 568
             Q 552 736 408 752
             Q 296 752 280 668"/>

    <!-- Right arm: a short kicker, signifying the routing branch.
         Deliberately shorter and straighter than the left so the J
         identity wins; this reads as "J with a junction tap" not "Y". -->
    <path d="M 552 568 Q 620 680 740 736"/>
  </g>
</svg>
