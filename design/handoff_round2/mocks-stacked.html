<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Junction · Settings Mocks (screenshot view)</title>
<style>
  html, body { margin: 0; padding: 40px 20px; background: #f0eee9; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; }
  .stack { display: flex; flex-direction: column; gap: 40px; align-items: flex-start; }
  .frame { display: flex; flex-direction: column; gap: 8px; }
  .frame .label { font-size: 12px; font-weight: 600; color: rgba(0,0,0,.55); letter-spacing: 0.2px; padding-left: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="lib/junction-shared.jsx"></script>
<script type="text/babel" src="lib/feedback-mocks.jsx"></script>

<script type="text/babel">
const mocks = [
  { id: 'm1', label: '① Activity · rule-builder', Cmp: ActivityRebuild },
  { id: 'm2', label: '② Rules · sidebar header', Cmp: RulesHeaderRebuild },
  { id: 'm3', label: '③ Handoff · disabled states', Cmp: HandoffRebuild },
  { id: 'm4', label: '④ Browsers · empty state', Cmp: BrowsersRebuild },
  { id: 'm5', label: '⑤ Advanced · restructured', Cmp: AdvancedRebuild },
];
ReactDOM.createRoot(document.getElementById('root')).render(
  <div className="stack">
    {mocks.map(m => (
      <div key={m.id} className="frame" id={m.id}>
        <div className="label">{m.label}</div>
        <m.Cmp />
      </div>
    ))}
  </div>
);
</script>
</body>
</html>
