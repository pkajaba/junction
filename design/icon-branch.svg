<?xml version="1.0" encoding="UTF-8"?>
<!-- Junction app icon v2 — "Branch"
     Trunk splitting into two diverging arrows; "routing" not "signpost".
     Spec from design handoff: lib/extras.jsx IconBranch.
     Background gradient is indigo (NOT slate — the README text was wrong,
     trust the screenshot and the JSX constant). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4A6CE0"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed gradient — macOS clips to the system squircle automatically. -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Branch artwork at 70% of canvas (matches IconBranch's size * 0.7), centered.
       Inner viewBox is 0 0 100 100; outer scale is 7.168 so 100 → 716.8px.
       Outer offset (1024 - 716.8) / 2 = 153.6. -->
  <g transform="translate(153.6 153.6) scale(7.168)">
    <!-- Trunk + the two splitting branches.
         stroke-width 7 in viewBox units → 50 px rendered. -->
    <g stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M50 88 V52"/>
      <path d="M50 52 Q50 28 20 22"/>
      <path d="M50 52 Q50 28 80 22"/>
    </g>
    <!-- Arrowheads (filled triangles) at the tips, and the trunk base dot. -->
    <g fill="white">
      <path d="M14 30 L20 8 L28 26 Z"/>
      <path d="M86 30 L80 8 L72 26 Z"/>
      <circle cx="50" cy="92" r="6"/>
    </g>
  </g>
</svg>
