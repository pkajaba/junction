name: Test

# Runs the unit-test suite + SwiftLint on every PR and every push to main.
# Free for public repos.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tooling
        run: brew install xcodegen swiftlint

      - name: Generate Xcode project
        run: xcodegen generate

      - name: SwiftLint
        # Run swiftlint as a separate step so its output is easy to spot
        # in the Actions UI, separate from xcodebuild's noise.
        run: swiftlint --strict

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild \
            -project Junction.xcodeproj \
            -scheme Junction \
            -destination 'platform=macOS' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult
          retention-days: 7
