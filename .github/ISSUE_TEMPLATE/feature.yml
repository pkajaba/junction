name: Feature request
description: Suggest a new capability or improvement.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: check [SPEC.md](https://github.com/pkajaba/junction/blob/main/SPEC.md) — the feature may already be planned (or explicitly out of scope).

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user pain, not the implementation. "I want a sidebar" is weak; "I can't tell which rule fired without opening Console" is strong.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the user see and do? Mockups welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve the same problem. Why did you reject them?

  - type: dropdown
    id: scope
    attributes:
      label: Rough scope
      options:
        - Polish (an hour or two)
        - Small feature (a day)
        - Medium feature (a week)
        - Major feature (multi-week)
        - Not sure
    validations:
      required: true

  - type: checkboxes
    id: read
    attributes:
      label: Pre-flight
      options:
        - label: I checked SPEC.md and existing issues / discussions.
          required: true
