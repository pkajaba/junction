name: Junction
options:
  bundleIdPrefix: com.pkajaba
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0-alpha"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"           # ad-hoc for local dev; replace with Developer ID for release
    DEVELOPMENT_TEAM: ""              # set locally; not committed
    GENERATE_INFOPLIST_FILE: NO       # we use a custom one (see targets.Junction.info)
    DEAD_CODE_STRIPPING: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO  # too noisy at pre-v0.1; revisit at M5
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"

targets:
  Junction:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/Junction
        type: group
    info:
      path: Sources/Junction/Info.plist
      properties:
        CFBundleName: Junction
        CFBundleDisplayName: Junction
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: "Copyright © 2026 Pavel Kajaba. MIT license."
        LSApplicationCategoryType: public.app-category.utilities
        # Junction runs as a menu-bar agent: no Dock icon, no app-switcher
        # entry. The status item is the only persistent UI; Settings opens
        # on demand. Critical for a router that's "always running but
        # rarely interacted with" — users shouldn't see it in cmd-tab or
        # accidentally Cmd-Q it.
        LSUIElement: true
        # Register as a handler for http and https URL schemes — this is what
        # lets macOS route link clicks to Junction once you set it as default.
        CFBundleURLTypes:
          - CFBundleURLName: Web URL (HTTP)
            CFBundleURLSchemes: [http, https]
            LSHandlerRank: Default
        # Optional but conventional: declare we handle the GetURL Apple Event.
        NSAppleEventsUsageDescription: "Junction receives URL events when it is your default browser."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pkajaba.junction
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
    preBuildScripts:
      - name: SwiftLint
        script: |
          # Run SwiftLint if available; warn (don't fail the build) if not.
          # CI installs it explicitly via brew. Local dev: `brew install swiftlint`.
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint
          elif [ -x /opt/homebrew/bin/swiftlint ]; then
            /opt/homebrew/bin/swiftlint
          else
            echo "warning: SwiftLint not installed — run \`brew install swiftlint\` to enable lint checks"
          fi
        basedOnDependencyAnalysis: false

  JunctionTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/JunctionTests
        type: group
    dependencies:
      - target: Junction
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pkajaba.junction.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Junction.app/Contents/MacOS/Junction
        # Tests don't need the @main app's hardened runtime constraints.
        ENABLE_HARDENED_RUNTIME: NO
        # Override the project-wide GENERATE_INFOPLIST_FILE=NO: the app
        # has a custom Info.plist, but the test bundle just needs the
        # auto-generated one. Without this, recent Xcode refuses to sign
        # the test bundle.
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Junction:
    build:
      targets:
        Junction: all
        JunctionTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - JunctionTests
    archive:
      config: Release
